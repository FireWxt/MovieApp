<div *ngIf="!isAuthenticated">
  <app-auth></app-auth>
</div>

<div *ngIf="isAuthenticated" class="app-container">
  <nav class="navbar">
    <div class="navbar-logo">MovieShelf</div>
    <div class="navbar-buttons">
      <button 
        class="nav-btn" 
        [class.active]="currentView === 'movies'"
        (click)="switchView('movies')"
      >
        Films
      </button>
      <button 
        class="nav-btn" 
        [class.active]="currentView === 'watchlists'"
        (click)="switchView('watchlists')"
      >
        Watchlists
      </button>
    </div>
    <div class="navbar-user">
      <span class="user-email">{{ currentUser?.email }}</span>
      <button class="logout-btn" (click)="logout()">Déconnexion</button>
    </div>
  </nav>

  <div class="view-container">
    <app-movies-list *ngIf="currentView === 'movies'"></app-movies-list>
    <app-watchlists *ngIf="currentView === 'watchlists'"></app-watchlists>
  </div>
</div>
