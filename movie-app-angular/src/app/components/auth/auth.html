<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">🎬 MovieApp</h1>

    <h2 class="auth-subtitle">{{ isLogin ? 'Connexion' : 'Créer un compte' }}</h2>

    <!-- Message d'erreur -->
    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          class="form-input"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          class="form-input"
          [disabled]="loading"
        />
      </div>

      <!-- Champ confirmation pour signup -->
      <div *ngIf="!isLogin" class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          class="form-input"
          [disabled]="loading"
        />
      </div>

      <!-- Bouton submit -->
      <button type="submit" class="submit-btn" [disabled]="loading">
        <span *ngIf="!loading">{{ isLogin ? 'Se connecter' : 'Créer un compte' }}</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <!-- Lien pour basculer entre login/signup -->
    <div class="form-toggle">
      <p>
        {{ isLogin ? 'Pas encore de compte ?' : 'Vous avez déjà un compte ?' }}
        <button type="button" class="toggle-link" (click)="toggleForm()" [disabled]="loading">
          {{ isLogin ? 'S\'inscrire' : 'Se connecter' }}
        </button>
      </p>
    </div>
  </div>
</div>
