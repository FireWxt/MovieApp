<div class="popup-overlay" (click)="onClose()">
  <div class="popup-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onClose()">X</button>
    <div class="movie-header">
      <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" [alt]="movie.title" class="movie-poster">
      <div class="movie-info">
        <h2>{{ movie.title }}</h2>
        <p><strong>Release Date:</strong> {{ movie.release_date }}</p>
        <p><strong>Rating:</strong> {{ movie.vote_average }} / 10</p>
        <button class="favorite-btn" (click)="toggleFavorite(movie)">
          {{ isFavorite(movie.id) ? '★ Retirer des favoris' : '☆ Ajouter aux favoris' }}
        </button>
      </div>
    </div>
    <div class="movie-body">
      <h3>Overview</h3>
      <p>{{ movie.overview }}</p>
      <h3>Cast</h3>
      <div class="cast-list">
        <div *ngFor="let actor of credits?.cast | slice:0:10" class="cast-member">
          <img [src]="'https://image.tmdb.org/t/p/w200' + actor.profile_path" [alt]="actor.name" class="actor-photo">
          <p>{{ actor.name }} as {{ actor.character }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
